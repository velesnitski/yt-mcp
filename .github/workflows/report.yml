name: YouTrack Daily Report

on:
  schedule:
    # Every weekday at 07:00 UTC
    - cron: '0 7 * * MON-FRI'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[report]"

      - name: Generate report
        env:
          YOUTRACK_TOKEN: ${{ secrets.YOUTRACK_TOKEN }}
          YOUTRACK_URL: ${{ secrets.YOUTRACK_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          TEAMS_CONFIG: scripts/teams.json
        run: python scripts/yt_report.py

      - name: Send email with report
        if: ${{ secrets.SMTP_HOST != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "YouTrack Daily Report — ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          html_body: file://reports/email_body.html
          attachments: reports/youtrack_issues_latest.xlsx

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "report: $(date +%Y-%m-%d) daily YouTrack issue snapshot"
          git push
